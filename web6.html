<!DOCTYPE html>
<html>
<head>

<title>Idea Graveyard</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.menu button{
padding:12px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
}

.section{
display:none;
}

input,textarea{
width:70%;
padding:10px;
margin:10px;
}

.idea{
background:white;
padding:15px;
margin:10px auto;
width:70%;
border-radius:10px;
box-shadow:0 0 5px gray;
}

</style>

</head>

<body>

<h1>Idea Graveyard</h1>
<p>Learn from Failed Businesses</p>

<div class="menu">

<button onclick="showSection('view')">View Failures</button>

<button onclick="showSection('submit')">Submit Failure</button>

<button onclick="showSection('search')">Search</button>

</div>

<!-- VIEW -->

<div id="view" class="section">

<h2>All Failures</h2>

<div id="allIdeas"></div>

</div>

<!-- SUBMIT -->

<div id="submit" class="section">

<h2>Submit Failure</h2>

<input id="title" placeholder="Business Type (food, shop, tech)">

<br>

<textarea id="reason" placeholder="Why did it fail"></textarea>

<br>

<button type="button" onclick="addIdea()">Submit</button>

</div>

<!-- SEARCH -->

<div id="search" class="section">

<h2>Search Failures</h2>

<input id="searchInput" placeholder="Search like food">

<button type="button" onclick="searchIdeas()">Search</button>

<div id="results"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "Alza....",

authDomain: "idea-graveyard.firebaseapp.com",

projectId: "idea-graveyard",

storageBucket: "idea-graveyard.appspot.com",

messagingSenderId: "123456789",

appId: "1:23456:abcd"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


window.showSection=function(section){

document.querySelectorAll(".section").forEach(div=>{
div.style.display="none";
});

document.getElementById(section).style.display="block";

if(section==="view"){
loadIdeas();
}

}


window.addIdea=async function(){

let title=document.getElementById("title").value;

let reason=document.getElementById("reason").value;

if(title=="" || reason==""){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"failures"),{

title:title,

reason:reason

});

alert("Failure Submitted");

}


async function loadIdeas(){

let container=document.getElementById("allIdeas");

container.innerHTML="";

const querySnapshot=await getDocs(collection(db,"failures"));

querySnapshot.forEach(doc=>{

let idea=doc.data();

let div=document.createElement("div");

div.className="idea";

div.innerHTML="<h3>"+idea.title+"</h3><p>"+idea.reason+"</p>";

container.appendChild(div);

});

}


window.searchIdeas=async function(){

let keyword=document.getElementById("searchInput").value.toLowerCase();

let resultBox=document.getElementById("results");

resultBox.innerHTML="";

const querySnapshot=await getDocs(collection(db,"failures"));

querySnapshot.forEach(doc=>{

let idea=doc.data();

if(

idea.title.toLowerCase().includes(keyword) ||

idea.reason.toLowerCase().includes(keyword)

){

let div=document.createElement("div");

div.className="idea";

div.innerHTML="<h3>"+idea.title+"</h3><p>"+idea.reason+"</p>";

resultBox.appendChild(div);

}

});

}

showSection("view");

</script>

</body>
</html>
